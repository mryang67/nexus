<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>NEXUS CLASH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Silkscreen:wght@400;700&display=swap');
:root{--bg:#07060e;--panel:rgba(12,10,28,0.92);--border:rgba(120,90,255,0.18);--accent:#a78bfa;--cyan:#22d3ee;--rose:#fb7185;--gold:#fbbf24;--green:#34d399;--blue-team:#38bdf8;--red-team:#f87171;--text:#e2e0f0;--dim:#5b577a;--sai-b:env(safe-area-inset-bottom,0px);--sai-l:env(safe-area-inset-left,0px);--sai-r:env(safe-area-inset-right,0px);}
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif;touch-action:none;}
#lobby{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 30% 20%,rgba(120,90,255,.07) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 75% 80%,rgba(251,113,133,.05) 0%,transparent 70%);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2em 0 3em;}
#lobby.gone{display:none;}
.lobby-wrap{width:min(96vw,680px);flex-shrink:0;padding:0 .5em;}
.logo{text-align:center;margin-bottom:1.8em;}
.logo h1{font-family:'Silkscreen',monospace;font-size:clamp(1.6rem,6vw,3.4rem);letter-spacing:.22em;background:linear-gradient(135deg,var(--cyan),var(--accent),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(167,139,250,.35));}
.logo p{font-size:.78rem;letter-spacing:.45em;color:var(--dim);margin-top:.3em;text-transform:uppercase;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.4em 1.6em;margin-bottom:1em;backdrop-filter:blur(24px);}
.card-title{font-family:'Silkscreen',monospace;font-size:.68rem;letter-spacing:.18em;color:var(--accent);margin-bottom:.8em;}
.field{margin-bottom:.6em;}.field label{display:block;font-size:.65rem;color:var(--dim);letter-spacing:.12em;margin-bottom:.2em;text-transform:uppercase;}
.field input{width:100%;background:rgba(7,6,14,.7);border:1px solid var(--border);border-radius:8px;padding:.6em .9em;color:var(--text);font-family:inherit;font-size:16px;outline:none;transition:border-color .25s;}
.field input:focus{border-color:var(--accent);}
.heroes{display:grid;grid-template-columns:repeat(4,1fr);gap:.6em;}
.hcard{background:rgba(7,6,14,.6);border:2px solid var(--border);border-radius:10px;padding:.55em .3em;text-align:center;cursor:pointer;transition:all .25s;}
.hcard:hover{border-color:rgba(167,139,250,.45);transform:translateY(-2px);}
.hcard.picked{border-color:var(--cyan);box-shadow:0 0 16px rgba(34,211,238,.25);}
.hcard .ic{width:36px;height:36px;border-radius:50%;margin:0 auto .2em;display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:1rem;font-weight:700;color:#fff;}
.hcard .nm{font-family:'Silkscreen',monospace;font-size:.5rem;letter-spacing:.06em;color:#ccc;}
.hcard .rl{font-size:.52rem;color:var(--dim);}
.teams{display:flex;gap:.6em;}
.tbtn{flex:1;padding:.7em;border-radius:8px;cursor:pointer;text-align:center;font-family:'Silkscreen',monospace;font-size:.65rem;letter-spacing:.12em;border:2px solid transparent;transition:all .25s;}
.tbtn.b{background:rgba(56,189,248,.08);color:var(--blue-team);border-color:rgba(56,189,248,.2);}
.tbtn.r{background:rgba(248,113,113,.08);color:var(--red-team);border-color:rgba(248,113,113,.2);}
.tbtn.b:hover,.tbtn.b.on{background:rgba(56,189,248,.2);border-color:var(--blue-team);box-shadow:0 0 14px rgba(56,189,248,.2);}
.tbtn.r:hover,.tbtn.r.on{background:rgba(248,113,113,.2);border-color:var(--red-team);box-shadow:0 0 14px rgba(248,113,113,.2);}
.custom-row{display:flex;gap:.5em;flex-wrap:wrap;margin-top:.5em;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.color-opt:hover{transform:scale(1.15);}.color-opt.on{border-color:#fff;box-shadow:0 0 12px currentColor;}
.trail-opt{padding:.35em .75em;border-radius:20px;cursor:pointer;font-size:.68rem;background:rgba(7,6,14,.7);border:1px solid var(--border);color:var(--dim);transition:all .2s;}
.trail-opt:hover{border-color:var(--accent);color:var(--text);}
.trail-opt.on{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.08);}
.go-btn{width:100%;padding:.9em;margin-top:.5em;border:none;border-radius:10px;cursor:pointer;font-family:'Silkscreen',monospace;font-size:.9rem;letter-spacing:.28em;background:linear-gradient(135deg,var(--accent),var(--cyan));color:#07060e;transition:all .3s;}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(167,139,250,.35);}
.go-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none;}
@media(max-width:500px){.heroes{grid-template-columns:repeat(2,1fr);}.card{padding:1em 1.2em;}.logo{margin-bottom:1.2em;}}
#game{position:fixed;inset:0;display:none;}#game.on{display:block;}
#gc{width:100%;height:100%;display:block;touch-action:none;}
.hud-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;gap:1em;padding:.4em 1.4em;background:var(--panel);border-bottom:1px solid var(--border);border-radius:0 0 10px 10px;backdrop-filter:blur(14px);z-index:10;font-family:'Silkscreen',monospace;font-size:.55rem;letter-spacing:.06em;}
.hs{display:flex;align-items:center;gap:.3em;}.hs .l{color:var(--dim);}
.bars-wrap{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);width:220px;z-index:10;}
.bw{height:7px;background:rgba(7,6,14,.8);border-radius:3px;margin-bottom:3px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.bf{height:100%;border-radius:2px;transition:width .25s;}.bf.hp{background:linear-gradient(90deg,#22c55e,#4ade80);}.bf.mp{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.bl{display:flex;justify-content:space-between;font-size:.5rem;color:var(--dim);font-family:'Silkscreen',monospace;margin-bottom:1px;}
.ab-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;padding:7px 12px;background:var(--panel);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(14px);z-index:10;}
.ab{width:46px;height:46px;border-radius:8px;border:2px solid rgba(167,139,250,.25);background:rgba(12,10,28,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:border-color .2s;}
.ab:hover{border-color:var(--cyan);}
.ab .k{font-family:'Silkscreen',monospace;font-size:.5rem;color:var(--dim);position:absolute;top:2px;left:4px;}
.ab .aname{font-family:'Silkscreen',monospace;font-size:.48rem;color:var(--text);text-align:center;line-height:1.1;}
.ab .cd{position:absolute;inset:0;border-radius:6px;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:.75rem;color:var(--rose);}
.minimap{position:fixed;bottom:14px;right:14px;width:130px;height:130px;background:var(--panel);border:1px solid var(--border);border-radius:10px;z-index:10;overflow:hidden;}
.kills-feed{position:fixed;top:42px;right:10px;z-index:10;display:flex;flex-direction:column;gap:2px;}
.kf-msg{background:var(--panel);padding:2px 7px;border-radius:4px;font-size:.58rem;border-left:3px solid var(--accent);animation:kfIn .3s ease;white-space:nowrap;}
@keyframes kfIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.dead-overlay{position:fixed;inset:0;background:rgba(7,6,14,.82);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.dead-overlay.on{display:flex;}
.dead-overlay .dt{font-family:'Silkscreen',monospace;font-size:1.4rem;color:var(--rose);letter-spacing:.18em;}
.dead-overlay .dc{font-family:'Silkscreen',monospace;font-size:3rem;color:#fff;margin-top:.2em;}
.scoreboard{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1em 1.4em;z-index:25;min-width:260px;display:none;backdrop-filter:blur(14px);}
.scoreboard.on{display:block;}
.scoreboard h3{font-family:'Silkscreen',monospace;font-size:.6rem;letter-spacing:.14em;color:var(--accent);margin-bottom:.4em;text-align:center;}
.sb-r{display:flex;justify-content:space-between;padding:.2em 0;font-size:.72rem;border-bottom:1px solid rgba(255,255,255,.04);}
.controls-hint{position:fixed;bottom:14px;left:14px;z-index:10;font-family:'Silkscreen',monospace;font-size:.45rem;color:var(--dim);line-height:1.6;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:5px 9px;}

/* Touch controls — hidden by default, shown by JS-added .touch-device class */
.touch-layer{display:none;position:fixed;inset:0;z-index:12;pointer-events:none;}
.joy-zone{position:absolute;left:var(--sai-l);bottom:var(--sai-b);width:44%;height:55%;pointer-events:auto;touch-action:none;}
.m-abilities{position:absolute;right:calc(16px + var(--sai-r));bottom:calc(24px + var(--sai-b));pointer-events:auto;touch-action:none;}
.m-ab{position:absolute;width:56px;height:56px;border-radius:50%;border:2px solid rgba(167,139,250,.3);background:rgba(12,10,28,.7);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;touch-action:none;transition:background .15s;}
.m-ab:active,.m-ab.pressed{background:rgba(167,139,250,.25);border-color:var(--cyan);}
.m-ab .m-k{font-family:'Silkscreen',monospace;font-size:.55rem;color:var(--dim);}
.m-ab .m-n{font-family:'Silkscreen',monospace;font-size:.42rem;color:var(--text);line-height:1.1;}
.m-ab .m-cd{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:.7rem;color:var(--rose);}
.m-atk{display:none;position:absolute;right:calc(16px + var(--sai-r));bottom:calc(24px + var(--sai-b));width:68px;height:68px;border-radius:50%;border:2px solid rgba(248,113,113,.35);background:rgba(248,30,60,.12);backdrop-filter:blur(8px);align-items:center;justify-content:center;pointer-events:auto;touch-action:none;font-family:'Silkscreen',monospace;font-size:.6rem;color:var(--rose);letter-spacing:.08em;}
.m-atk:active,.m-atk.pressed{background:rgba(248,30,60,.3);border-color:var(--rose);}
.m-sb-btn{display:none;position:fixed;top:4px;right:10px;z-index:15;padding:5px 10px;border-radius:6px;background:var(--panel);border:1px solid var(--border);font-family:'Silkscreen',monospace;font-size:.5rem;color:var(--dim);pointer-events:auto;touch-action:none;}

/* JS adds .touch-device to body — this controls ALL mobile visibility */
.touch-device .touch-layer{display:block;}
.touch-device .m-atk{display:flex;}
.touch-device .m-sb-btn{display:block;}
.touch-device .ab-bar{display:none!important;}
.touch-device .controls-hint{display:none!important;}
.touch-device .bars-wrap{bottom:auto;top:34px;width:180px;}
.touch-device .hud-bar{padding:.35em 1em;font-size:.48rem;gap:.7em;}
.touch-device .kills-feed{top:62px;right:6px;}
.touch-device .kf-msg{font-size:.5rem;padding:2px 5px;}

.gameover{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;backdrop-filter:blur(6px);}
.gameover.on{display:flex;}
.gameover.win{background:rgba(34,197,94,.12);}
.gameover.lose{background:rgba(248,113,113,.12);}
.gameover .go-title{font-family:'Silkscreen',monospace;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.2em;margin-bottom:.3em;}
.gameover.win .go-title{color:var(--gold);}
.gameover.lose .go-title{color:var(--rose);}
.gameover .go-sub{font-family:'Silkscreen',monospace;font-size:.7rem;color:var(--dim);letter-spacing:.12em;margin-bottom:1.5em;}
.gameover .go-stats{font-family:'Silkscreen',monospace;font-size:.8rem;color:var(--text);letter-spacing:.08em;line-height:2;}
.gameover .go-btn{padding:.7em 2em;margin-top:1.5em;border:none;border-radius:8px;cursor:pointer;font-family:'Silkscreen',monospace;font-size:.75rem;letter-spacing:.2em;background:var(--accent);color:#07060e;}

@media(max-width:900px){.touch-device .minimap{width:90px;height:90px;bottom:calc(10px + var(--sai-b));right:calc(10px + var(--sai-r));}.touch-device .minimap canvas{width:90px!important;height:90px!important;}}
.landscape-prompt{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2em;}
.landscape-prompt .lp-icon{font-family:'Silkscreen',monospace;font-size:2.5rem;color:var(--accent);margin-bottom:.5em;transform:rotate(90deg);display:inline-block;}
.landscape-prompt .lp-text{font-family:'Silkscreen',monospace;font-size:.7rem;letter-spacing:.12em;color:var(--dim);}
@media(max-width:600px) and (orientation:portrait){.landscape-prompt{display:flex;}}
</style>
</head>
<body>
<div class="landscape-prompt" id="lp"><div class="lp-icon">[ ]</div><div class="lp-text">Rotate your device to landscape</div></div>
<div id="lobby"><div class="lobby-wrap">
  <div class="logo"><h1>NEXUS CLASH</h1><p>Arena MOBA</p></div>
  <div class="card"><div class="card-title">// Identity</div><div class="field"><label>Summoner Name</label><input id="inp-name" maxlength="14" placeholder="Enter your name" spellcheck="false"/></div></div>
  <div class="card"><div class="card-title">// Hero Select</div><div class="heroes" id="hero-grid"></div></div>
  <div class="card"><div class="card-title">// Team</div><div class="teams"><div class="tbtn b" onclick="pickTeam('blue')">ORDER</div><div class="tbtn r" onclick="pickTeam('red')">CHAOS</div></div></div>
  <div class="card"><div class="card-title">// Customise</div><div class="field"><label>Hero Colour</label></div><div class="custom-row" id="color-row"></div><div class="field" style="margin-top:.7em"><label>Trail Effect</label></div><div class="custom-row" id="trail-row"></div><div class="field" style="margin-top:.7em"><label>Aura Style</label></div><div class="custom-row" id="aura-row"></div></div>
  <button class="go-btn" id="go-btn" disabled onclick="launch()">ENTER THE ARENA</button>
</div></div>
<div id="game">
  <canvas id="gc"></canvas>
  <div class="hud-bar"><div class="hs"><span class="l">LVL</span><span id="h-lv">1</span></div><div class="hs"><span class="l">K</span><span id="h-k" style="color:var(--rose)">0</span></div><div class="hs"><span class="l">D</span><span id="h-d">0</span></div><div class="hs"><span class="l">CS</span><span id="h-cs">0</span></div><div class="hs"><span class="l">GOLD</span><span id="h-g" style="color:var(--gold)">500</span></div><div class="hs"><span class="l">TIME</span><span id="h-t">0:00</span></div></div>
  <div class="bars-wrap"><div class="bl"><span>HP</span><span id="hp-t"></span></div><div class="bw"><div class="bf hp" id="hp-b" style="width:100%"></div></div><div class="bl"><span>MANA</span><span id="mp-t"></span></div><div class="bw"><div class="bf mp" id="mp-b" style="width:100%"></div></div></div>
  <div class="ab-bar" id="ab-bar"></div>
  <div class="minimap"><canvas id="mc" width="140" height="140"></canvas></div>
  <div class="kills-feed" id="kf"></div>
  <div class="dead-overlay" id="dead-ov"><div class="dt">SLAIN</div><div class="dc" id="dead-cd">5</div></div>
  <div class="scoreboard" id="sb"><h3>SCOREBOARD</h3><div id="sb-body"></div></div>
  <div class="controls-hint">WASD move | 1234 abilities | LMB attack | TAB scores</div>
  <div class="touch-layer" id="touch-layer"><div class="joy-zone" id="joy-zone"></div><div class="m-abilities" id="m-abs"></div></div>
  <div class="m-atk" id="m-atk">ATK</div>
  <button class="m-sb-btn" id="m-sb-btn" onclick="document.getElementById('sb').classList.toggle('on')">SCORE</button>
  <div class="gameover" id="gameover">
    <div class="go-title" id="go-title"></div>
    <div class="go-sub" id="go-sub"></div>
    <div class="go-stats" id="go-stats"></div>
    <button class="go-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://sbkeaqdxxqnaeckousql.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNia2VhcWR4eHFuYWVja291c3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTc3NDcsImV4cCI6MjA5NTQzMzc0N30.uelSkGIRQQsR8r7BdGeBj3-e8DNTHw3VN4x3SVefTYY';
const ROOM_ID='nexus-arena-01';

// Robust touch detection — multiple signals, any one is enough
const IS_MOBILE = (
  'ontouchstart' in window ||
  navigator.maxTouchPoints > 0 ||
  /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
  (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
);

// Add class to body IMMEDIATELY so CSS can show/hide controls
if(IS_MOBILE) document.body.classList.add('touch-device');

const HEROES=[
  {id:'vanguard',name:'VANGUARD',role:'Fighter',glyph:'V',baseColor:'#f97316',hp:680,mp:220,ad:52,spd:3.3,rng:55,as:780,iconIdx:0,melee:true,
    ab:[{n:'Bash',k:'1',cd:4500,cost:35,dmg:85,aoe:90},{n:'Charge',k:'2',cd:7000,cost:45,dash:190,dmg:55},{n:'Fury',k:'3',cd:11000,cost:50,buff:'atkSpd',dur:4500},{n:'Quake',k:'4',cd:40000,cost:95,dmg:260,aoe:170}]},

  {id:'shadebow',name:'SHADEBOW',role:'Marksman',glyph:'S',baseColor:'#22c55e',hp:360,mp:260,ad:62,spd:3.1,rng:310,as:620,iconIdx:2,melee:false,

  {id:'luminary',name:'LUMINARY',role:'Support',glyph:'L',baseColor:'#06b6d4',hp:440,mp:420,ad:28,spd:2.9,rng:240,as:880,iconIdx:3,melee:false,

];

const PALETTE=['#f97316','#ef4444','#ec4899','#a855f7','#6366f1','#3b82f6','#06b6d4','#22c55e','#eab308','#f5f5f4'];
const TRAILS=[{id:'none',label:'None'},{id:'sparks',label:'Sparks'},{id:'flame',label:'Flame'},{id:'frost',label:'Frost'},{id:'shadow',label:'Shadow'}];
const AURAS=[{id:'none',label:'None'},{id:'pulse',label:'Pulse'},{id:'rings',label:'Rings'},{id:'glow',label:'Glow'}];
let pick={name:'',hero:null,team:null,color:PALETTE[0],trail:'sparks',aura:'pulse'};

let G={running:false,t0:0,cam:{x:0,y:0},mouse:{x:0,y:0,wx:0,wy:0},keys:{},ents:[],projs:[],parts:[],kf:[],effects:[],me:null,remote:{},minionT:0,eid:1,shakeT:0,shakeAmt:0,touchDX:0,touchDY:0,touchAtk:false,gameOver:false,minionWave:0};

function connectSB(){if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return;const host=SUPABASE_URL.replace('https://','').replace(/\/$/,'');try{ws=new WebSocket(`wss://${host}/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`);let hb,ref=1;ws.onopen=()=>{connected=true;ws.send(JSON.stringify({topic:`realtime:${ROOM_ID}`,event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:pick.name}}},ref:ref++}));hb=setInterval(()=>ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:ref++})),25000);};ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.event==='broadcast')handleRemote(m.payload?.payload||m.payload);}catch(x){}};ws.onclose=()=>{connected=false;clearInterval(hb);setTimeout(connectSB,3000);};ws.onerror=()=>ws.close();}catch(e){}}
function broadcast(ev,data){if(!ws||ws.readyState!==1)return;ws.send(JSON.stringify({topic:`realtime:${ROOM_ID}`,event:'broadcast',payload:{type:'broadcast',event:ev,payload:data},ref:bRef++}));}
function handleRemote(p){if(!p?.event)return;if(p.event==='state'){const d=p.data;if(d.name===pick.name)return;G.remote[d.name]={...G.remote[d.name],...d,seen:Date.now()};}if(p.event==='kill')addKill(p.killer,p.victim,p.team);}
function sendState(){if(!G.me||!connected)return;const p=G.me;broadcast('state',{data:{name:p.name,heroId:p.heroId,team:p.team,x:~~p.x,y:~~p.y,hp:~~p.hp,maxHp:p.maxHp,level:p.level,dead:p.dead,color:p.color,kills:p.kills,deaths:p.deaths}});}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function ang(a,b){return Math.atan2(b.y-a.y,b.x-a.x);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lerpAngle(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t;}
function addKill(k,v,t){G.kf.unshift({text:`${k} slew ${v}`,color:t==='blue'?'#38bdf8':'#f87171',t:Date.now()});if(G.kf.length>5)G.kf.pop();}
function shake(a,d){G.shakeAmt=a;G.shakeT=d;}
function spawnPart(x,y,text,color,life,vy){G.parts.push({x,y,text,color,life:life||700,born:Date.now(),vy:vy||-1.4});}
function addEffect(type,x,y,radius,color,life){G.effects.push({type,x,y,radius,maxR:radius,color,born:Date.now(),life:life||500});}
function nearestEnemy(from,range){let nr=null,nd=range||9999;G.ents.filter(e=>!e.dead&&e.team&&e.team!==from.team).forEach(e=>{const d=dist(from,e);if(d<nd){nd=d;nr=e;}});return{target:nr,dist:nd};}

const LANE_BLUE=[{x:250,y:1000},{x:600,y:1000},{x:1000,y:1000},{x:1400,y:1000},{x:1800,y:1000}];
const LANE_RED=[{x:1750,y:1000},{x:1400,y:1000},{x:1000,y:1000},{x:600,y:1000},{x:200,y:1000}];

function makeTowers(){const ts=[];[{tm:'blue',x:400,y:1000},{tm:'blue',x:700,y:1000},{tm:'red',x:1300,y:1000},{tm:'red',x:1600,y:1000},{tm:'blue',x:350,y:500},{tm:'blue',x:350,y:1500},{tm:'red',x:1650,y:500},{tm:'red',x:1650,y:1500},{tm:'blue',x:220,y:880},{tm:'blue',x:220,y:1120},{tm:'red',x:1780,y:880},{tm:'red',x:1780,y:1120}].forEach(d=>ts.push({type:'tower',id:G.eid++,team:d.tm,x:d.x,y:d.y,hp:1600,maxHp:1600,lastAtk:0,dead:false}));return ts;}
function makeNexus(){return[{type:'nexus',id:G.eid++,team:'blue',x:100,y:1000,hp:3500,maxHp:3500,dead:false},{type:'nexus',id:G.eid++,team:'red',x:1900,y:1000,hp:3500,maxHp:3500,dead:false}];}
function spawnMinions(){G.minionWave++;const spawnLane=(tm,path,sx,sy)=>{for(let i=0;i<3;i++)G.ents.push({type:'minion',id:G.eid++,team:tm,x:sx+(Math.random()-.5)*30,y:sy+(Math.random()-.5)*40,hp:280,maxHp:280,ad:18,spd:1.7,rng:55,as:1100,lastAtk:0,dead:false,path:[...path],pi:0,gold:20,facing:tm==='blue'?0:Math.PI});};spawnLane('blue',LANE_BLUE,150,1000);spawnLane('red',LANE_RED,1850,1000);if(G.minionWave%2===0){spawnLane('blue',FLANK_BLUE,200,600);spawnLane('red',FLANK_RED,1800,1400);}}

function makePlayer(name,heroId,team,local,color,trail,aura){const h=HEROES.find(x=>x.id===heroId);const sx=team==='blue'?180+Math.random()*60:1820-Math.random()*60;const sy=1000+(Math.random()-.5)*100;return{type:'player',id:G.eid++,name,heroId,team,local,x:sx,y:sy,prevX:sx,prevY:sy,hp:h.hp,maxHp:h.hp,mp:h.mp,maxMp:h.mp,ad:h.ad,spd:h.spd,rng:h.rng,as:h.as,color:color||h.baseColor,trail:trail||'none',aura:aura||'none',iconIdx:h.iconIdx,lastAtk:0,atkAnim:-9999,facing:team==='blue'?0:Math.PI,dead:false,kills:0,deaths:0,cs:0,gold:500,xp:0,level:1,cds:[0,0,0,0],shield:0,respawnAt:0,spdMul:1,asMul:1,isBot:false,botLane:'mid',pathIdx:0};}
function makeBot(team,idx){const h=HEROES[idx%HEROES.length];const names=['Aether','Zephyr','Nova','Bolt','Shade','Flux','Rune','Drift'];const p=makePlayer(names[idx%names.length],h.id,team,false,h.baseColor,TRAILS[1+idx%4].id,AURAS[1+idx%3].id);p.isBot=true;p.botLane=idx%2===0?'mid':'flank';return p;}

function endGame(deadTeam){if(G.gameOver)return;G.gameOver=true;const won=deadTeam!==pick.team;const el=document.getElementById('gameover');el.classList.add('on',won?'win':'lose');document.getElementById('go-title').textContent=won?'VICTORY':'DEFEAT';document.getElementById('go-sub').textContent=won?'The enemy nexus has been destroyed':'Your nexus has fallen';const p=G.me;const elapsed=~~((Date.now()-G.t0)/1000);const m=~~(elapsed/60);const s=elapsed%60;document.getElementById('go-stats').innerHTML=`${p.kills} / ${p.deaths} / ${p.cs}<br>Gold: ${p.gold} | Level: ${p.level}<br>Time: ${m}:${(s<10?'0':'')+s}`;}

function damage(src,tgt,dmg){if(!tgt||tgt.dead||G.gameOver)return;if(tgt.shield>0){const a=Math.min(tgt.shield,dmg);tgt.shield-=a;dmg-=a;}tgt.hp-=dmg;spawnPart(tgt.x,tgt.y-18,~~dmg+'','#fb7185',650);if(tgt.hp<=0){tgt.hp=0;tgt.dead=true;for(let i=0;i<12;i++){const a=Math.PI*2*i/12;G.parts.push({x:tgt.x+Math.cos(a)*14,y:tgt.y+Math.sin(a)*14,text:'.',color:tgt.team==='blue'?'#38bdf8':'#f87171',life:600,born:Date.now(),vy:(Math.random()-.5)*2.5,vx:Math.cos(a)*2});}addEffect('burst',tgt.x,tgt.y,30,tgt.team==='blue'?'#38bdf8':'#f87171',400);if(src&&src.type==='player'){if(tgt.type==='player'){src.kills++;src.xp+=75;src.gold+=280;shake(4,200);}if(tgt.type==='minion'){src.cs++;src.xp+=22;src.gold+=(tgt.gold||18);}if(tgt.type==='tower'){src.gold+=400;src.xp+=130;shake(6,300);}if(tgt.type==='nexus'){src.gold+=1000;src.xp+=500;shake(8,500);}lvlUp(src);}if(tgt.type==='player'){tgt.deaths++;tgt.respawnAt=Date.now()+BASE_RESPAWN+tgt.level*900;addKill(src?.name||src?.type||'?',tgt.name,src?.team||'');}if(tgt.type==='nexus')endGame(tgt.team);}}
function lvlUp(p){while(p.level<10&&p.xp>=XP_TABLE[p.level]){p.level++;p.maxHp+=55;p.hp=Math.min(p.hp+55,p.maxHp);p.maxMp+=22;p.mp=Math.min(p.mp+22,p.maxMp);p.ad+=7;spawnPart(p.x,p.y-28,'LEVEL UP','#fbbf24',1200,-.8);addEffect('ring',p.x,p.y,40,'#fbbf24',600);}}

function useAb(pl,idx,tx,ty){if(G.gameOver)return;const h=HEROES.find(x=>x.id===pl.heroId);const ab=h.ab[idx];if(!ab||pl.cds[idx]>0||pl.mp<ab.cost||pl.dead)return;pl.mp-=ab.cost;pl.cds[idx]=ab.cd;const a=Math.atan2(ty-pl.y,tx-pl.x);pl.facing=a;if(ab.proj){G.projs.push({x:pl.x,y:pl.y,vx:Math.cos(a)*ab.proj,vy:Math.sin(a)*ab.proj,dmg:ab.dmg+pl.ad*.4,team:pl.team,owner:pl.id,rng:ab.pRng||380,trav:0,color:pl.color,heal:ab.heal||0,r:6,trail:[]});}if(ab.dash){const ox=pl.x,oy=pl.y;pl.x+=Math.cos(a)*ab.dash;pl.y+=Math.sin(a)*ab.dash;pl.x=clamp(pl.x,20,MW-20);pl.y=clamp(pl.y,20,MH-20);if(ab.dmg)G.ents.filter(e=>!e.dead&&e.team!==pl.team&&dist(e,pl)<95).forEach(e=>damage(pl,e,ab.dmg));for(let i=0;i<5;i++){const t=i/5;G.parts.push({x:ox+(pl.x-ox)*t,y:oy+(pl.y-oy)*t,text:'.',color:pl.color+'88',life:300,born:Date.now(),vy:0,vx:0});}addEffect('line',ox,oy,0,pl.color,300);G.effects[G.effects.length-1].x2=pl.x;G.effects[G.effects.length-1].y2=pl.y;}if(ab.aoe&&!ab.proj&&!ab.dash){const cx=ab.aoe>150?tx:pl.x,cy=ab.aoe>150?ty:pl.y;addEffect('ring',cx,cy,ab.aoe,pl.color,ab.delay||400);setTimeout(()=>{if(G.gameOver)return;G.ents.filter(e=>!e.dead&&e.team!==pl.team&&dist(e,{x:cx,y:cy})<ab.aoe).forEach(e=>damage(pl,e,(ab.dmg||0)+pl.ad*.25));if(ab.heal)G.ents.filter(e=>!e.dead&&e.team===pl.team&&e.type==='player'&&dist(e,{x:cx,y:cy})<ab.aoe).forEach(e=>{e.hp=Math.min(e.maxHp,e.hp+ab.heal);spawnPart(e.x,e.y-18,'+'+ab.heal,'#34d399',700);});addEffect('burst',cx,cy,ab.aoe*.7,pl.color,350);shake(3,150);},ab.delay||0);}if(ab.shield){pl.shield+=ab.shield;addEffect('ring',pl.x,pl.y,28,'#fbbf24',300);setTimeout(()=>{pl.shield=Math.max(0,pl.shield-ab.shield);},ab.dur||3000);}if(ab.buff==='atkSpd'){pl.asMul=.5;addEffect('ring',pl.x,pl.y,24,pl.color,400);setTimeout(()=>{pl.asMul=1;},ab.dur||4000);}}

function updTower(tw){if(tw.dead)return;const now=Date.now();if(now-tw.lastAtk<TOWER_RATE)return;const tgts=G.ents.filter(e=>!e.dead&&e.team&&e.team!==tw.team&&dist(e,tw)<TOWER_RANGE);const mn=tgts.filter(t=>t.type==='minion');const tgt=mn[0]||tgts[0];if(tgt){damage(tw,tgt,TOWER_DMG);tw.lastAtk=now;G.projs.push({x:tw.x,y:tw.y,vx:(tgt.x-tw.x)*.15,vy:(tgt.y-tw.y)*.15,dmg:0,team:tw.team,rng:75,trav:0,color:tw.team==='blue'?'#38bdf8':'#f87171',shot:true,r:4,trail:[]});}}
function updMinion(m){if(m.dead)return;const es=G.ents.filter(e=>!e.dead&&e.team!==m.team&&dist(e,m)<180);let nr=null,nd=180;es.forEach(e=>{const d=dist(e,m);if(d<nd){nd=d;nr=e;}});if(nr&&nd<m.rng+15){if(Date.now()-m.lastAtk>m.as){damage(m,nr,m.ad);m.lastAtk=Date.now();}m.facing=ang(m,nr);}else if(nr){const a=ang(m,nr);m.x+=Math.cos(a)*m.spd;m.y+=Math.sin(a)*m.spd;m.facing=a;}else if(m.path&&m.pi<m.path.length){const wp=m.path[m.pi];if(dist(m,wp)<35)m.pi++;else{const a=ang(m,wp);m.x+=Math.cos(a)*m.spd;m.y+=Math.sin(a)*m.spd;m.facing=a;}}}
function updBot(b){if(b.dead)return;const es=G.ents.filter(e=>!e.dead&&e.team&&e.team!==b.team);let nr=null,nd=380;es.forEach(e=>{const d=dist(b,e);if(d<nd){nd=d;nr=e;}});if(nr)b.facing=ang(b,nr);if(nr&&nd<b.rng+15){if(Date.now()-b.lastAtk>b.as*b.asMul){damage(b,nr,b.ad);b.lastAtk=Date.now();b.atkAnim=Date.now();}}else if(nr&&nd<320){const a=ang(b,nr);b.x+=Math.cos(a)*b.spd;b.y+=Math.sin(a)*b.spd;}else{const path=b.botLane==='mid'?(b.team==='blue'?LANE_BLUE:LANE_RED):(b.team==='blue'?FLANK_BLUE:FLANK_RED);const wp=path[Math.min(b.pathIdx||0,path.length-1)];if(dist(b,wp)<50)b.pathIdx=Math.min((b.pathIdx||0)+1,path.length-1);const a=ang(b,wp);b.x+=Math.cos(a)*b.spd*.65;b.y+=Math.sin(a)*b.spd*.65;b.facing=a;}b.hp=Math.min(b.maxHp,b.hp+.4);b.mp=Math.min(b.maxMp,b.mp+.25);if(nr&&nd<190&&b.cds[0]<=0&&b.mp>=35)useAb(b,0,nr.x,nr.y);}

function render(){
  const W=canvas.width/dpr,H=canvas.height/dpr;
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.scale(dpr,dpr);
  if(G.me){G.cam.x+=(G.me.x-W/2-G.cam.x)*.09;G.cam.y+=(G.me.y-H/2-G.cam.y)*.09;}
  G.cam.x=clamp(G.cam.x,0,Math.max(0,MW-W));G.cam.y=clamp(G.cam.y,0,Math.max(0,MH-H));
  let sx=0,sy=0;if(G.shakeT>0){sx=(Math.random()-.5)*G.shakeAmt*2;sy=(Math.random()-.5)*G.shakeAmt*2;}
  ctx.save();ctx.translate(-G.cam.x+sx,-G.cam.y+sy);
  drawArena();drawEffects();drawEnts();drawProjs();drawRemote();drawParts();
  ctx.restore();
  if(IS_MOBILE){if(joyActive)drawJoystick();else drawJoystickHint();}
  ctx.restore();drawMinimap();
}

function drawArena(){ctx.fillStyle='#08071a';ctx.fillRect(0,0,MW,MH);ctx.strokeStyle='rgba(100,80,200,0.035)';ctx.lineWidth=1;for(let x=0;x<MW;x+=TILE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MH);ctx.stroke();}for(let y=0;y<MH;y+=TILE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MW,y);ctx.stroke();}ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(120,90,255,0.025)';ctx.lineWidth=60;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(120,1000);ctx.lineTo(1880,1000);ctx.stroke();ctx.beginPath();ctx.moveTo(120,600);ctx.quadraticCurveTo(1000,220,1880,600);ctx.stroke();ctx.beginPath();ctx.moveTo(120,1400);ctx.quadraticCurveTo(1000,1780,1880,1400);ctx.stroke();ctx.strokeStyle='rgba(120,90,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([8,16]);ctx.beginPath();ctx.moveTo(120,970);ctx.lineTo(1880,970);ctx.stroke();ctx.beginPath();ctx.moveTo(120,1030);ctx.lineTo(1880,1030);ctx.stroke();ctx.setLineDash([]);ctx.restore();const now=Date.now();const shimmer=Math.sin(now*.001)*.005+.025;ctx.save();ctx.globalCompositeOperation='lighter';const rg=ctx.createLinearGradient(0,930,0,1070);rg.addColorStop(0,'rgba(34,211,238,0)');rg.addColorStop(.5,`rgba(34,211,238,${shimmer})`);rg.addColorStop(1,'rgba(34,211,238,0)');ctx.fillStyle=rg;ctx.fillRect(0,890,MW,220);ctx.restore();[['blue',100,1000,'56,189,248'],['red',1900,1000,'248,113,113']].forEach(([,bx,by,rgb])=>{ctx.save();ctx.globalCompositeOperation='lighter';for(let i=0;i<6;i++){const a=Math.PI/3*i;ctx.strokeStyle=`rgba(${rgb},0.06)`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a)*120,by+Math.sin(a)*120);ctx.stroke();}const gr=ctx.createRadialGradient(bx,by,10,bx,by,200);gr.addColorStop(0,`rgba(${rgb},0.1)`);gr.addColorStop(1,`rgba(${rgb},0)`);ctx.fillStyle=gr;ctx.beginPath();ctx.arc(bx,by,200,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(${rgb},0.12)`;ctx.lineWidth=1.5;ctx.setLineDash([6,12]);ctx.beginPath();ctx.arc(bx,by,160,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();}); function drawBar(x,y,w,h,val,max,col){const pct=clamp(val/max,0,1);ctx.fillStyle='rgba(0,0,0,0.55)';roundRect(ctx,x-w/2,y,w,h,h/2);ctx.fill();const fw=w*pct;if(fw>1){ctx.fillStyle=col;roundRect(ctx,x-w/2,y,fw,h,Math.min(h/2,fw/2));ctx.fill();}}
function roundRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);if(r<0)r=0;c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

  const zone=document.getElementById('joy-zone');
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  zone.addEventListener('touchstart',e=>{e.preventDefault();if(joyActive)return;const t=e.changedTouches[0];joyTouchId=t.identifier;joyActive=true;joyCX=t.clientX;joyCY=t.clientY;joyTX=t.clientX;joyTY=t.clientY;},{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();for(let i=0;i<e.changedTouches.length;i++){const t=e.changedTouches[i];if(t.identifier===joyTouchId){let dx=t.clientX-joyCX,dy=t.clientY-joyCY;const d=Math.hypot(dx,dy);if(d>joyRadius){dx=dx/d*joyRadius;dy=dy/d*joyRadius;}joyTX=joyCX+dx;joyTY=joyCY+dy;if(d>joyDeadzone){G.touchDX=dx/joyRadius;G.touchDY=dy/joyRadius;}else{G.touchDX=0;G.touchDY=0;}}}},{passive:false});
  const endJoy=e=>{for(let i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyTouchId){joyActive=false;joyTouchId=null;G.touchDX=0;G.touchDY=0;}}};
  zone.addEventListener('touchend',endJoy);zone.addEventListener('touchcancel',endJoy);
  const absEl=document.getElementById('m-abs');const h=HEROES.find(z=>z.id===pick.hero);
  const positions=[{x:38,y:-22},{x:98,y:38},{x:38,y:98},{x:-22,y:38}];
  h.ab.forEach((ab,i)=>{const btn=document.createElement('div');btn.className='m-ab';btn.id='mab-'+i;btn.style.left=positions[i].x+'px';btn.style.top=positions[i].y+'px';btn.innerHTML=`<span class="m-k">${i+1}</span><span class="m-n">${ab.n}</span>`;btn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(!G.me||G.me.dead||G.gameOver)return;btn.classList.add('pressed');const{target}=nearestEnemy(G.me,500);const tx=target?target.x:G.me.x+(G.touchDX||0)*200;const ty=target?target.y:G.me.y+(G.touchDY||0)*200;useAb(G.me,i,tx,ty);},{passive:false});btn.addEventListener('touchend',()=>btn.classList.remove('pressed'));btn.addEventListener('touchcancel',()=>btn.classList.remove('pressed'));absEl.appendChild(btn);});
  const atkBtn=document.getElementById('m-atk');let atkInterval=null;
  atkBtn.style.right='calc(148px + var(--sai-r))';atkBtn.style.bottom='calc(50px + var(--sai-b))';
  atkBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();atkBtn.classList.add('pressed');G.touchAtk=true;atkInterval=setInterval(()=>{if(!G.me||G.me.dead||G.gameOver){G.touchAtk=false;return;}const{target}=nearestEnemy(G.me,G.me.rng+50);if(target)doAttack(target.x,target.y);},150);if(G.me&&!G.me.dead&&!G.gameOver){const{target}=nearestEnemy(G.me,G.me.rng+50);if(target)doAttack(target.x,target.y);}},{passive:false});
  const endAtk=()=>{atkBtn.classList.remove('pressed');G.touchAtk=false;clearInterval(atkInterval);};
  atkBtn.addEventListener('touchend',endAtk);atkBtn.addEventListener('touchcancel',endAtk);
}

let lastT=0,syncT=0;
function loop(ts){if(!G.running)return;const dt=Math.min(ts-lastT,50);lastT=ts;update(dt);render();updateHUD();syncT+=dt;if(syncT>100){sendState();syncT=0;}requestAnimationFrame(loop);}

function update(dt){const p=G.me;if(!p)return;if(G.gameOver)return;if(p.dead&&Date.now()>=p.respawnAt){p.dead=false;p.hp=p.maxHp;p.mp=p.maxMp;p.x=p.team==='blue'?180:1820;p.y=1000;}if(!p.dead){let dx=0,dy=0;if(G.keys.w||G.keys.arrowup)dy=-1;if(G.keys.s||G.keys.arrowdown)dy=1;if(G.keys.a||G.keys.arrowleft)dx=-1;if(G.keys.d||G.keys.arrowright)dx=1;if(Math.abs(G.touchDX)>.05||Math.abs(G.touchDY)>.05){dx=G.touchDX;dy=G.touchDY;}if(dx||dy){const len=Math.hypot(dx,dy);p.prevX=p.x;p.prevY=p.y;p.x+=dx/len*p.spd*p.spdMul;p.y+=dy/len*p.spd*p.spdMul;p.x=clamp(p.x,20,MW-20);p.y=clamp(p.y,20,MH-20);p.facing=lerpAngle(p.facing,Math.atan2(dy,dx),.15);if(p.trail!=='none'&&Math.random()<.4){const tc={sparks:'#fbbf24',flame:'#ef4444',frost:'#22d3ee',shadow:'#6b21a8'}[p.trail]||p.color;G.parts.push({x:p.prevX+(Math.random()-.5)*8,y:p.prevY+(Math.random()-.5)*8,text:'.',color:tc,life:380,born:Date.now(),vy:-.3-Math.random()*.4,vx:(Math.random()-.5)*1.2});}}p.hp=Math.min(p.maxHp,p.hp+.12);p.mp=Math.min(p.maxMp,p.mp+.2);}G.ents.filter(e=>e.type==='player').forEach(pl=>{pl.cds=pl.cds.map(c=>Math.max(0,c-dt));});G.ents.filter(e=>e.type==='tower').forEach(updTower);G.ents.filter(e=>e.type==='minion').forEach(updMinion);G.ents.filter(e=>e.type==='player'&&e.isBot).forEach(updBot);G.ents.filter(e=>e.type==='player'&&e.isBot&&e.dead&&Date.now()>=e.respawnAt).forEach(b=>{b.dead=false;b.hp=b.maxHp;b.mp=b.maxMp;b.x=b.team==='blue'?180+Math.random()*50:1820-Math.random()*50;b.y=1000+(Math.random()-.5)*80;b.pathIdx=0;});G.projs=G.projs.filter(pr=>{if(pr.trail){pr.trail.push({x:pr.x,y:pr.y});if(pr.trail.length>8)pr.trail.shift();}pr.x+=pr.vx;pr.y+=pr.vy;pr.trav+=Math.hypot(pr.vx,pr.vy);if(pr.trav>pr.rng)return false;if(pr.shot)return pr.trav<pr.rng;const hits=G.ents.filter(e=>!e.dead&&e.team&&e.team!==pr.team&&dist(e,pr)<18);if(hits.length){const ow=G.ents.find(e=>e.id===pr.owner);if(pr.dmg>0)damage(ow||{type:'proj'},hits[0],pr.dmg);addEffect('burst',pr.x,pr.y,12,pr.color,200);return false;}return true;});G.parts=G.parts.filter(p=>Date.now()-p.born<p.life);G.minionT+=dt;if(G.minionT>MINION_RATE){spawnMinions();G.minionT=0;}G.ents=G.ents.filter(e=>!(e.dead&&e.type==='minion'));if(G.shakeT>0){G.shakeT-=dt;if(G.shakeT<=0)G.shakeAmt=0;}}

function launch(){
  pick.name=document.getElementById('inp-name').value.trim()||'Player';
  document.getElementById('lobby').classList.add('gone');document.getElementById('game').classList.add('on');
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');mCanvas=document.getElementById('mc');mCtx=mCanvas.getContext('2d');
  dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){const w=window.innerWidth,h=window.innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';const small=w<=900;const ms=small?90:140;mCanvas.width=ms;mCanvas.height=ms;mCanvas.style.width=ms+'px';mCanvas.style.height=ms+'px';}
  resize();window.addEventListener('resize',resize);
  if(IS_MOBILE){window.addEventListener('orientationchange',()=>setTimeout(resize,200));screen.orientation?.lock?.('landscape').catch(()=>{});}
  setupDesktopInput();
  if(IS_MOBILE) setupMobileInput();
  G.ents=[...makeTowers(),...makeNexus()];G.me=makePlayer(pick.name,pick.hero,pick.team,true,pick.color,pick.trail,pick.aura);G.ents.push(G.me);
  const enemy=pick.team==='blue'?'red':'blue';for(let i=0;i<2;i++)G.ents.push(makeBot(pick.team,i+1));for(let i=0;i<3;i++)G.ents.push(makeBot(enemy,i));spawnMinions();
  G.t0=Date.now();G.running=true;lastT=performance.now();if(SUPABASE_URL&&SUPABASE_ANON_KEY)connectSB();requestAnimationFrame(loop);
}
